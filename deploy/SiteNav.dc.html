<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @keyframes opMenuDrop { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: none; } }
    @keyframes opItemIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  </style>
</helmet>
<nav style="{{ navStyle }}">
  <div style="max-width:1200px;margin:0 auto;padding:0 24px;height:72px;display:flex;align-items:center;justify-content:space-between;gap:24px;">
    <a href="{{ homeHref }}" style="display:flex;align-items:center;flex-shrink:0;position:relative;">
      <img src="assets/logo-white.png" alt="opsfinitive" style="{{ logoWhiteStyle }}" />
      <img src="assets/logo-black.png" alt="opsfinitive" aria-hidden="true" style="{{ logoBlackStyle }}" />
    </a>
    <div style="display:flex;align-items:center;gap:30px;">
      <div style="position:static;" onMouseEnter="{{ openPlatform }}" onMouseLeave="{{ closePlatform }}">
        <span style="{{ platformTriggerStyle }}">Platform {{ platformChevron }}</span>
        <sc-if value="{{ platformOpen }}" hint-placeholder-val="{{ false }}">
          <div onMouseEnter="{{ openPlatform }}" onMouseLeave="{{ closePlatform }}" style="position:fixed;left:0;right:0;top:72px;z-index:60;background:#ffffff;border-bottom:1px solid rgba(17,17,17,0.08);box-shadow:0 30px 60px rgba(17,17,17,0.13);animation:opMenuDrop .28s cubic-bezier(0.16,1,0.3,1);">
            <div style="max-width:1200px;margin:0 auto;padding:34px 24px 38px;display:grid;grid-template-columns:1.55fr 1fr;gap:56px;">
              <div>
                <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#9b9a90;font-weight:500;">Platform</span>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 28px;margin-top:20px;">
                  <sc-for list="{{ platformItems }}" as="prod" hint-placeholder-count="2">
                    <a href="{{ prod.href }}" target="{{ prod.target }}" style="{{ prod.itemStyle }}" style-hover="background:rgba(15,138,91,0.07);">
                      <div style="font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:17px;letter-spacing:-0.01em;color:#0e0e0c;">{{ prod.name }}</div>
                      <div style="font-size:13.5px;line-height:1.45;color:#75746b;margin-top:3px;">{{ prod.sub }}</div>
                    </a>
                  </sc-for>
                </div>
              </div>
              <a href="blog.html" style="display:block;text-decoration:none;animation:opItemIn .4s .12s both;">
                <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#9b9a90;font-weight:500;">From our blog</span>
                <div style="margin-top:20px;border-radius:14px;overflow:hidden;border:1px solid rgba(17,17,17,0.08);">
                  <img src="assets/blog-top5.jpg" alt="" style="width:100%;height:132px;object-fit:cover;display:block;" />
                  <div style="padding:14px 16px;">
                    <div style="font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:15px;line-height:1.25;letter-spacing:-0.01em;color:#0e0e0c;">Top 5 signs your business needs a DevOps upgrade</div>
                    <span style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#0f8a5b;font-weight:600;">Read post →</span>
                  </div>
                </div>
              </a>
            </div>
          </div>
        </sc-if>
      </div>
      <a href="{{ layersHref }}" style="{{ navLinkStyle }}">Layers</a>
      <a href="{{ capsHref }}" style="{{ navLinkStyle }}">Capabilities</a>
      <a href="{{ deliverHref }}" style="{{ navLinkStyle }}">What we deliver</a>
      <a href="blog.html" style="{{ blogLinkStyle }}">Blog</a>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;">
      <a href="{{ sandboxHref }}" style="{{ navGhostStyle }}">Launch sandbox</a>
      <a href="{{ contactHref }}" style="{{ navCtaStyle }}">Talk to us</a>
    </div>
  </div>
</nav>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 200 },
  &quot;overlay&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot; },
  &quot;base&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;active&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  state = { scrolled: (typeof window !== 'undefined' && window.scrollY > 10), platformOpen: false };

  platformProducts = [
    { name: 'Plumbline', sub: 'Governance layer for agentic operations', href: 'plumbline.html', target: '_self' },
    { name: 'Assessment', sub: 'Score your operational maturity', href: 'https://assessment-kiosk.davis-cc1.workers.dev/assess', target: '_blank' }
  ];

  onScroll = () => {
    const sc = window.scrollY > (this.props.overlay ? window.innerHeight * 0.82 : 10);
    if (sc !== this.state.scrolled) this.setState({ scrolled: sc });
  };
  componentDidMount() {
    window.addEventListener('scroll', this.onScroll, { passive: true });
    this.onScroll();
  }
  componentWillUnmount() {
    window.removeEventListener('scroll', this.onScroll);
    clearTimeout(this._t);
  }

  renderVals() {
    const overlay = this.props.overlay || false;
    const base = this.props.base || '';
    const active = this.props.active || '';
    const menuOpen = this.state.platformOpen;
    // solid = show the light/opaque nav treatment
    const solid = !overlay || this.state.scrolled || menuOpen;

    const navStyle = {
      position: overlay ? 'fixed' : 'sticky', top: 0, left: 0, right: 0, zIndex: 50,
      transition: menuOpen ? 'none' : 'background .3s, backdrop-filter .3s, border-color .3s',
      background: menuOpen ? '#ffffff' : (solid ? 'rgba(251,251,249,0.9)' : 'transparent'),
      backdropFilter: menuOpen ? 'none' : (solid ? 'saturate(180%) blur(14px)' : 'none'),
      borderBottom: menuOpen ? '1px solid transparent' : (solid ? '1px solid rgba(17,17,17,0.08)' : '1px solid transparent')
    };
    const txTr = menuOpen ? 'none' : 'color .25s';
    const btnTr = menuOpen ? 'none' : 'all .25s';
    const navLinkStyle = {
      fontFamily: "'Hanken Grotesk',system-ui,sans-serif", fontSize: '15px', fontWeight: 500,
      textDecoration: 'none', transition: txTr,
      color: solid ? '#3f3e37' : 'rgba(255,255,255,0.9)'
    };
    const blogLinkStyle = { ...navLinkStyle, fontWeight: active === 'blog' ? 700 : 500, color: active === 'blog' ? (solid ? '#0e0e0c' : '#fff') : navLinkStyle.color };
    const platformTriggerStyle = { ...navLinkStyle, display: 'inline-flex', alignItems: 'center', gap: '6px', cursor: 'pointer', color: (active === 'platform' || menuOpen) ? (solid ? '#0e0e0c' : '#fff') : navLinkStyle.color };
    const platformChevron = React.createElement('svg', { width: 13, height: 13, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.4, strokeLinecap: 'round', strokeLinejoin: 'round', style: { transition: 'transform .2s', transform: menuOpen ? 'rotate(180deg)' : 'none' } }, React.createElement('polyline', { points: '6 9 12 15 18 9' }));
    const navGhostStyle = {
      fontFamily: "'Hanken Grotesk',system-ui,sans-serif", fontSize: '15px', fontWeight: 600, textDecoration: 'none',
      padding: '10px 22px', borderRadius: '999px', transition: btnTr, background: 'transparent',
      border: solid ? '1px solid rgba(17,17,17,0.18)' : '1px solid rgba(255,255,255,0.5)',
      color: solid ? '#0e0e0c' : '#fff'
    };
    const navCtaStyle = {
      fontFamily: "'Hanken Grotesk',system-ui,sans-serif", fontSize: '15px', fontWeight: 600, textDecoration: 'none',
      padding: '10px 22px', borderRadius: '999px', transition: btnTr,
      background: solid ? '#0f8a5b' : '#fff', color: solid ? '#fff' : '#0e0e0c'
    };
    const logoWhiteStyle = { height: '26px', width: 'auto', display: 'block', transition: menuOpen ? 'none' : 'opacity .3s', opacity: solid ? 0 : 1 };
    const logoBlackStyle = { height: '26px', width: 'auto', display: 'block', position: 'absolute', top: 0, left: 0, transition: menuOpen ? 'none' : 'opacity .3s', opacity: solid ? 1 : 0 };

    return {
      navStyle, navLinkStyle, blogLinkStyle, platformTriggerStyle, platformChevron, navGhostStyle, navCtaStyle,
      logoWhiteStyle, logoBlackStyle,
      platformOpen: menuOpen,
      homeHref: base ? base : '#top',
      layersHref: base + '#layers', capsHref: base + '#capabilities', deliverHref: base + '#deliverables',
      sandboxHref: base + '#sandbox', contactHref: base + '#contact',
      platformItems: this.platformProducts.map((p, i) => ({
        name: p.name, sub: p.sub, href: p.href, target: p.target,
        itemStyle: { display: 'block', padding: '13px 15px', borderRadius: '12px', textDecoration: 'none', transition: 'background .18s', animation: 'opItemIn .4s ' + (0.05 + i * 0.06).toFixed(2) + 's both' }
      })),
      openPlatform: () => { clearTimeout(this._t); this.setState({ platformOpen: true }); },
      closePlatform: () => { clearTimeout(this._t); this._t = setTimeout(() => this.setState({ platformOpen: false }), 160); }
    };
  }
}
</script>
</body>
</html>
